name: Sync to KTH Git

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KTH_SSH_KEY }}

      - name: Push to KTH Git
        run: |
          git remote add kth git@gits-15.sys.kth.se:iprog-students/chaoqi-quanzha-shenyu-vt26-project.git
          git push kth --all